<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESIA - Knowledge Graph Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* Diseño UI/UX de alta tecnología (Dark Blueprint) */
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            /* Patrón de cuadrícula sutil para aspecto de ingeniería */
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        #grafico { 
            width: 100vw; 
            height: 100vh; 
        }

        /* Panel de control flotante elegante */
        .hud-panel {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-left: 4px solid #d4af37;
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
            backdrop-filter: blur(4px);
            color: #f8fafc;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .hud-title {
            font-size: 16px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .hud-text {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }
        
        .hud-highlight { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="hud-panel">
        <div class="hud-title">ESIA KNOWLEDGE GRAPH</div>
        <div class="hud-text">
            <span class="hud-highlight">■</span> CLIC: Expandir / Contraer ramas<br>
            <span class="hud-highlight">■</span> HOVER: Leer metadatos y diagramas UML<br>
            <span class="hud-highlight">■</span> SCROLL: Zoom In / Out<br>
            <span class="hud-highlight">■</span> ARRASTRAR: Navegar por el lienzo
        </div>
    </div>

    <div id="grafico"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
